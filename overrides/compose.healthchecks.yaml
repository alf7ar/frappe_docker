# =============================================================================
# Application Health Check Overlay (ALF-17 H-1)
#
# Adds liveness checks to tenant application containers.
# The `db` service already has a healthcheck in pwd.yml.
#
# Usage:
#   docker compose \
#     -f frappe_docker/pwd.yml \
#     -f frappe_docker/overrides/compose.healthchecks.yaml \
#     up -d
#
# Verify after deploy:
#   docker inspect frappe_docker-backend-1 \
#     --format '{{.State.Health.Status}}'
# =============================================================================

services:
  # Gunicorn web process — poll the Frappe ping endpoint
  backend:
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/method/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx reverse proxy — basic HTTP check
  frontend:
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Socket.IO realtime server — TCP port check (no HTTP listener)
  websocket:
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Scheduler — process liveness check
  scheduler:
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'bench schedule' || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Short queue worker — process liveness check
  queue-short:
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'bench worker' || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Long queue worker — process liveness check
  queue-long:
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'bench worker' || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
