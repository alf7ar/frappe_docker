global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'alfhar-erpnext'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # cAdvisor - Docker container CPU/RAM/disk metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 10s

  # Node-level metrics (if node-exporter is added later)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
