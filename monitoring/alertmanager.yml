global:
  # Time to wait before sending a notification again if it has already been sent
  resolve_timeout: 5m

  # Default SMTP settings (configure via environment variables or edit here)
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alerts@alfhar.com'
  # smtp_auth_username: 'alerts@alfhar.com'
  # smtp_auth_password: '${SMTP_PASSWORD}'

route:
  # Default receiver for all alerts
  receiver: 'default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts — faster notification
    - match:
        severity: critical
      receiver: 'default'
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: 'default'
    # Email notification (uncomment and configure to enable)
    # email_configs:
    #   - to: 'ops@alfhar.com'
    #     subject: '[ALERT] {{ .GroupLabels.alertname }}'
    #     body: |
    #       {{ range .Alerts }}
    #       Alert: {{ .Annotations.summary }}
    #       Description: {{ .Annotations.description }}
    #       Severity: {{ .Labels.severity }}
    #       {{ end }}

    # Webhook notification (uncomment and configure to enable)
    # webhook_configs:
    #   - url: 'http://your-webhook-endpoint/alert'
    #     send_resolved: true

    # Telegram notification (uncomment and configure to enable)
    # webhook_configs:
    #   - url: 'https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage'
    #     http_config:
    #       bearer_token: '${TELEGRAM_BOT_TOKEN}'

inhibit_rules:
  # Inhibit warning alerts when a critical alert is already firing for the same container
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['name']
